services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - serralheiro

  backend:
    build:
      context: ./docker/backend
    volumes:
      - ./backend:/var/www/html
    working_dir: /var/www/html
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - serralheiro

  frontend:
    build:
      context: ./docker/frontend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - serralheiro

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: serralheiro
      POSTGRES_USER: serralheiro
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serralheiro"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - serralheiro

volumes:
  pgdata:
  frontend_node_modules:

networks:
  serralheiro:
    driver: bridge
